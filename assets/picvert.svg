<svg xmlns="http://www.w3.org/2000/svg" width="60" height="72" viewBox="0 0 60 72" role="img" aria-label="Pic vert">
  <!-- European green woodpecker (Picus viridis) - easter egg -->
  <g transform="translate(4,4)">
    <!-- tail -->
    <path d="M14 52 L8 68 L20 58 Z" fill="#4a7a2b"/>
    <!-- body -->
    <ellipse cx="26" cy="40" rx="14" ry="18" fill="#7cb342"/>
    <path d="M26 24 a14 18 0 0 1 0 32 Z" fill="#8bc34a"/>
    <!-- head -->
    <circle cx="34" cy="18" r="11" fill="#9ccc65"/>
    <!-- red crown -->
    <path d="M26 12 a11 11 0 0 1 18 2 q-9 -6 -18 -2 Z" fill="#e53935"/>
    <!-- black cheek stripe -->
    <path d="M30 20 q6 3 11 1 q-5 4 -11 1 Z" fill="#212121"/>
    <!-- eye -->
    <circle cx="37" cy="16" r="2.2" fill="#212121"/>
    <circle cx="37.7" cy="15.3" r="0.7" fill="#ffffff"/>
    <!-- beak -->
    <path d="M45 17 L58 15 L45 21 Z" fill="#616161"/>
    <!-- feet -->
    <path d="M22 57 l-3 8 M28 57 l0 9" stroke="#616161" stroke-width="2" fill="none"/>
  </g>
</svg>
